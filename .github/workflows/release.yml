name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  # Don't cancel in-progress publishes — they can leave package state half-published.
  cancel-in-progress: false

jobs:
  release:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - run: pnpm -r --if-present lint

      - name: Test (excluding examples that depend on built artifacts)
        run: pnpm -r --if-present --filter '!./examples/**' test
        env:
          CI: true

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
