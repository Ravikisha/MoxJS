<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shell</title>
    <!--
      Rspack Module Federation uses @module-federation/runtime which exposes
      __federation_init_sharing__ and __federation_shared__ on globalThis.
      Webpack-style containers (and our runtime's initRemoteContainer) expect
      __webpack_init_sharing__ and __webpack_share_scopes__.default.
      This shim MUST run synchronously before any module scripts so that the
      share-scope object is already in place when remoteEntry.js executes.
    -->
    <script>
      (function mfjsShareScopeShim() {
        var g = typeof globalThis !== 'undefined' ? globalThis
              : typeof window !== 'undefined' ? window : self;

        // Bridge Rspack federation → webpack-style globals so the remote's
        // container.init() receives the same share-scope object the host built.
        Object.defineProperty(g, '__webpack_init_sharing__', {
          configurable: true,
          get: function () {
            return g.__federation_init_sharing__
              ? function (scope) { return g.__federation_init_sharing__(scope); }
              : undefined;
          }
        });

        Object.defineProperty(g, '__webpack_share_scopes__', {
          configurable: true,
          get: function () {
            return g.__federation_shared__ ? { default: g.__federation_shared__ } : undefined;
          },
          set: function () { /* ignore writes from Rspack runtime */ }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
